<!DOCTYPE html>
<html>
<head>
<!-- Drag -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<!-- Calendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOUPYUD</title>

<style>
body { margin:0; font-family: Arial; background:#f5f3ff; }

#loginPage { display:flex; height:100vh; justify-content:center; align-items:center; }
.login-box { background:white; padding:20px; border-radius:12px; width:250px; }

input, select { width:100%; padding:8px; margin:5px 0; }

button {
  width:100%;
  padding:10px;
  background:#7c3aed;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#app { display:none; }

.header {
  background:#7c3aed;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.board { display:flex; gap:10px; padding:10px; overflow-x:auto; }

.column {
  background:#ede9fe;
  border-radius:10px;
  padding:10px;
  min-width:250px;
}

.card {
  background:#7c3aed;
  color:white;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  cursor:grab;
}

.modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h3>FLOUPYUD</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
 <div class="header">
  <b>FLOUPYUD</b>
  <div>
    <button onclick="openModal()">+ Customer</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ✅ dashboard DI SINI -->
<div style="padding:10px">
  <b>Total:</b> <span id="total">0</span> |
  <b>Closing:</b> <span id="closingCount">0</span> |
  <b>Rate:</b> <span id="rate">0%</span>
</div>

<!-- ✅ chart DI SINI -->
<canvas id="chart" height="100"></canvas>

  <div class="board">
  ...
</div>

<!-- ✅ taruh DI SINI -->
<div id="calendar" style="padding:10px;"></div>
    
    <div class="column" id="baru"><h3>Baru</h3></div>
    <div class="column" id="followup"><h3>Follow Up</h3></div>
    <div class="column" id="pending"><h3>Pending</h3></div>
    <div class="column" id="closing"><h3>Closing</h3></div>
  </div>
</div>

<!-- MODAL CUSTOMER -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Customer</h3>
    <input id="nama" placeholder="Nama">
    <input id="hp" placeholder="No HP">
    <input id="tanggal" type="date">
    <button onclick="saveCustomer()">Simpan</button>
    <button onclick="closeModal()">Tutup</button>
  </div>
</div>

<!-- MODAL FOLLOW UP -->
<div class="modal" id="modalFU">
  <div class="modal-box">
    <h3>Follow Up</h3>

    <select id="media">
      <option>Whatsapp Chat</option>
      <option>Whatsapp Call</option>
      <option>Telegram Chat</option>
      <option>Telegram Call</option>
    </select>

    <select id="status_pesan">
      <option>Dibaca</option>
      <option>Belum Dibaca</option>
      <option>Gagal Kirim</option>
    </select>

    <select id="respon">
      <option>Ya</option>
      <option>Tidak</option>
      <option>Menunggu</option>
    </select>

    <input id="jenis_respon" placeholder="Isi balasan">
    <input id="penyebab" placeholder="Penyebab">
    <input id="reminder" type="datetime-local">

    <button onclick="saveFU()">Simpan FU</button>
    <button onclick="closeFU()">Tutup</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCfj2Xdj6et3fThyA2gg-GWG8yZOhoqREA",
  authDomain: "floupyud.firebaseapp.com",
  projectId: "floupyud"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentCustomer = null;
  let currentRole = null;

// LOGIN
window.login = function(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=>console.log("Login sukses"))
  .catch(e=>{
    alert(e.message); // 🔥 WAJIB biar tau errornya
    console.log(e);
  });
}

// LOGOUT
window.logout = function(){ auth.signOut(); }

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){

    db.collection("users").doc(user.uid).get().then(doc=>{
      currentRole = doc.data()?.role || "cs";

      loginPage.style.display="none";
      app.style.display="block";

      loadData();
    });

  } else {
    loginPage.style.display="flex";
    app.style.display="none";
  }
});

// CUSTOMER
window.openModal = ()=> modal.style.display="flex";
window.closeModal = ()=> modal.style.display="none";

window.saveCustomer = function(){

  if(!nama.value || !hp.value){
    alert("Nama & No HP wajib diisi!");
    return;
  }

  db.collection("customers").add({
    nama:nama.value,
    hp:hp.value,
    tanggal:tanggal.value,
    status:"baru",
    user_id:auth.currentUser.uid
  });

  // reset form
  nama.value = "";
  hp.value = "";
  tanggal.value = "";

  closeModal();
}

// FOLLOW UP
window.openFU = function(id){
  currentCustomer = id;
  modalFU.style.display="flex";
}

window.closeFU = ()=> modalFU.style.display="none";

window.saveFU = function(){
 db.collection("followups").add({
  customer_id:currentCustomer,
  media:media.value,
  status_pesan:status_pesan.value,
  respon:respon.value,
  jenis_respon:jenis_respon.value,
  penyebab:penyebab.value,
  tanggal:new Date().toISOString(),
  reminder: reminder.value
});

  db.collection("customers").doc(currentCustomer).update({
    status:"followup"
  });

  closeFU();
}

  function showNotif(text){
  let div = document.createElement("div");
  div.innerText = text;

  div.style.background = "#7c3aed";
  div.style.color = "white";
  div.style.padding = "10px";
  div.style.marginBottom = "10px";
  div.style.borderRadius = "8px";

  document.getElementById("notifBox").appendChild(div);

  setTimeout(()=> div.remove(), 4000);
}

// LOAD DATA
function loadData(){
  db.collection("customers")
  .where("user_id","==",auth.currentUser.uid)
  .onSnapshot(snap=>{

    document.querySelectorAll(".column")
    .forEach(c=>c.innerHTML="<h3>"+c.id+"</h3>");

    let total = 0;
let closing = 0;
let pending = 0;
let followup = 0;

    snap.forEach(doc=>{
      let d = doc.data();

     total++;

if(d.status === "closing") closing++;
if(d.status === "pending") pending++;
if(d.status === "followup") followup++;

      let card = document.createElement("div");
      card.className="card";
      card.setAttribute("data-id", doc.id);
      card.onclick = () => showHistory(doc.id);

      card.innerHTML = `
        <b>${d.nama}</b><br>
        ${d.hp}<br>

        <button onclick="event.stopPropagation(); openWA('${d.hp}')">WA</button>
        <button onclick="event.stopPropagation(); openFU('${doc.id}')">Follow Up</button><br>

        <button onclick="event.stopPropagation(); updateStatus('${doc.id}','followup')">→ FU</button>
        <button onclick="event.stopPropagation(); updateStatus('${doc.id}','pending')">→ Pending</button>
        <button onclick="event.stopPropagation(); updateStatus('${doc.id}','closing')">→ Closing</button>

        <br><br>

        <button onclick="event.stopPropagation(); editCustomer('${doc.id}','${d.nama}','${d.hp}','${d.tanggal}')">Edit</button>
        <button onclick="event.stopPropagation(); deleteCustomer('${doc.id}')">Hapus</button>
      `;

      document.getElementById(d.status).appendChild(card);
    });

    // ✅ TARUH DI SINI (SETELAH LOOP)
    document.getElementById("total").innerText = total;
document.getElementById("closingCount").innerText = closing;

let rate = total ? Math.round((closing/total)*100) : 0;
document.getElementById("rate").innerText = rate + "%";

loadChart(total, closing, pending, followup);
loadCalendar();
checkReminder();
setTimeout(initDrag, 300);
  });
}

window.updateStatus = function(id, status){
  db.collection("customers").doc(id).update({
    status: status
  });
}

 function showHistory(id){
  db.collection("followups")
  .where("customer_id","==",id)
  .get()
  .then(snap=>{
    let text = "";

    snap.forEach(d=>{
      let f = d.data();
      text += `
${f.media} | ${f.respon}
${f.jenis_respon}
---------------------
`;
    });

    alert(text || "Belum ada follow up");
  });
}

  window.deleteCustomer = function(id){
  if(confirm("Yakin mau hapus customer ini?")){
    db.collection("customers").doc(id).delete();
  }
}

  window.editCustomer = function(id, n, h, t){
  nama.value = n;
  hp.value = h;
  tanggal.value = t;

  openModal();

  // ubah tombol jadi mode update
  window.saveCustomer = function(){

    if(!nama.value || !hp.value){
      alert("Nama & No HP wajib diisi!");
      return;
    }

    db.collection("customers").doc(id).update({
      nama:nama.value,
      hp:hp.value,
      tanggal:tanggal.value
    });

    closeModal();

    // balikin ke mode tambah lagi
    location.reload();
  }
}

  function initDrag(){
  ["baru","followup","pending","closing"].forEach(status=>{
    new Sortable(document.getElementById(status), {
      group: "shared",
      animation: 150,

      onAdd: function (evt) {
        let id = evt.item.getAttribute("data-id");
        let newStatus = evt.to.id;

        db.collection("customers").doc(id).update({
          status: newStatus
        });
      }
    });
  });
}

 function checkReminder(){
  db.collection("followups").get().then(snap=>{
    let now = new Date();

    snap.forEach(doc=>{
      let d = doc.data();

      if(d.reminder){
        let t = new Date(d.reminder);

        if(t <= now && !d.notified){

          showNotif("Follow up: " + d.jenis_respon);

          db.collection("followups").doc(doc.id).update({
            notified:true
          });
        }
      }
    });
  });
}

  window.openWA = function(hp){
  let nomor = hp.replace(/^0/, "62");
  let link = "https://wa.me/" + nomor;

  window.open(link, "_blank");
}

let calendar = null;

function loadCalendar(){

  if(calendar){
    calendar.destroy();
  }

  let calendarEl = document.getElementById('calendar');

  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: 500
  });

  db.collection("followups").get().then(snap=>{
    snap.forEach(doc=>{
      let d = doc.data();

      if(d.reminder){
        calendar.addEvent({
          title: d.jenis_respon,
          start: d.reminder
        });
      }
    });

    calendar.render();
  });
}

function loadChart(total, closing, pending, followup){

  // ✅ HAPUS chart lama kalau ada
  if(myChart){
    myChart.destroy();
  }

  // ✅ BUAT chart baru
  myChart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: ['Total','Closing','Pending','Follow Up'],
      datasets: [{
        label: 'Performa',
        data: [total, closing, pending, followup]
      }]
    }
  });

}

</script>

    <!-- NOTIF -->
<div id="notifBox" style="
position:fixed;
top:20px;
right:20px;
z-index:9999;
"></div>

</body>
</html>
